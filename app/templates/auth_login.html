{% extends "base.html" %}
{% block content %}
<section class="auth-page">
  <h1>Log in</h1>
  {% if reset_done %}<p class="flash">Password updated — log in with your new password.</p>{% endif %}
  {% if error %}<p class="flash flash-error">{{ error }}</p>{% endif %}
  <form class="auth-form" action="/account/login" method="post">
    <input type="hidden" name="next" value="{{ next or '/account' }}">
    <label>Email
      <input type="email" name="email" value="{{ email or '' }}" required autocomplete="email">
    </label>
    <label>Password
      <input type="password" name="password" required autocomplete="current-password">
    </label>
    <button type="submit">Log in</button>
  </form>
  <p class="hint"><a href="/account/forgot">Forgot your password?</a></p>
  <p class="hint">No account yet? <a href="/account/signup">Sign up</a>.</p>
</section>
{% endblock %}
