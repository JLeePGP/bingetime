{# Reusable calculator: the show's runtime is the base (auto-filled); the user
   sets a rewatch count + playback speed. Driven by /static/js/calculator.js #}
<div class="calc"
     data-base-min="{% if show is defined and show and show.total_runtime_min %}{{ show.total_runtime_min }}{% else %}0{% endif %}"
     {% if show is defined and show %}data-show-title="{{ show.title }}"{% endif %}>
  <h2 class="calc-title">Watch-time calculator</h2>
  <div class="calc-inputs">
    <label>Times watched
      <input type="number" name="times_watched" min="1" max="10000" step="1" value="1">
    </label>
    <label>Watch speed
      <select name="playback_speed">
        <option value="0.5">0.5×</option>
        <option value="0.75">0.75×</option>
        <option value="1" selected>1× (normal)</option>
        <option value="1.25">1.25×</option>
        <option value="1.5">1.5×</option>
        <option value="2">2×</option>
      </select>
    </label>
  </div>

  <div class="calc-results" hidden>
    <div class="calc-headline"><span data-out="breakdown">—</span></div>
    <ul class="calc-units">
      <li><strong data-out="hours">—</strong> hours</li>
      <li><strong data-out="days">—</strong> days</li>
      <li><strong data-out="weeks">—</strong> weeks</li>
    </ul>
    <p class="calc-share">You've spent <strong data-out="share">—</strong>{% if show is defined and show %} on {{ show.title }}{% endif %} 📺</p>
  </div>
</div>
